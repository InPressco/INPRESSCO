<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InPressco — Devis</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Josefin+Sans:wght@100;200;300&family=Syne:wght@400;600;700;800&display=swap');

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg0: #141414;
      --bg1: #1a1a1a;
      --bg2: #1e1e1e;
      --bg3: #242424;
      --bg4: #2a2a2a;
      --amber: #C99E67;
      --amber-dim: #A07840;
      --amber-faint: #2a1e10;
      --amber-glow: rgba(201, 158, 103, 0.08);
      --amber-border: rgba(201, 158, 103, 0.2);
      --text-primary: #f0e8dd;
      --text-secondary: #a09080;
      --text-muted: #585044;
      --mono: 'IBM Plex Mono', monospace;
      --display: 'Syne', sans-serif;
      --radius-sm: 4px;
      --radius-md: 8px;
      --radius-lg: 12px;
    }

    body {
      background: #F5EDD8;
      color: var(--text-primary);
      font-family: var(--mono);
      font-size: 13px;
      line-height: 1.5;
      min-height: 100vh;
    }

    /* ── ATOMS ── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      border-radius: 99px;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.04em;
      font-family: var(--mono);
      white-space: nowrap;
    }

    .badge-ok {
      background: #1a2e0a;
      color: #97C459;
      border: 0.5px solid #3B6D11;
    }

    .badge-err {
      background: #2e0a0a;
      color: #F09595;
      border: 0.5px solid #A32D2D;
    }

    .badge-warn {
      background: #2e1a0a;
      color: #FAC775;
      border: 0.5px solid #854F0B;
    }

    .badge-idle {
      background: var(--bg3);
      color: var(--text-muted);
      border: 0.5px solid var(--text-muted);
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      display: inline-block;
      flex-shrink: 0;
    }

    .dot-ok {
      background: #639922;
      box-shadow: 0 0 0 2px rgba(99, 153, 34, 0.25);
    }

    .dot-err {
      background: #E24B4A;
      box-shadow: 0 0 0 2px rgba(226, 75, 74, 0.25);
    }

    .dot-warn {
      background: #C99E67;
      box-shadow: 0 0 0 2px rgba(201, 158, 103, 0.25);
      animation: pulse 2s infinite;
    }

    .dot-idle {
      background: var(--text-muted);
    }

    @keyframes pulse {

      0%,
      100% {
        box-shadow: 0 0 0 2px rgba(201, 158, 103, 0.25);
      }

      50% {
        box-shadow: 0 0 0 4px rgba(201, 158, 103, 0.45);
      }
    }

    .pill-tag {
      display: inline-block;
      padding: 1px 6px;
      border-radius: 3px;
      font-size: 10px;
      letter-spacing: 0.06em;
      font-family: var(--mono);
      background: var(--bg4);
      color: var(--text-muted);
      border: 0.5px solid rgba(90, 80, 64, 0.4);
    }

    /* ── MOLECULES ── */
    .card {
      background: var(--bg2);
      border: 0.5px solid rgba(90, 80, 64, 0.35);
      border-radius: var(--radius-lg);
      padding: 16px 20px;
    }

    .card-amber {
      background: var(--bg2);
      border: 0.5px solid var(--amber-border);
      border-radius: var(--radius-lg);
      padding: 16px 20px;
    }

    .stat-card {
      background: var(--bg2);
      border: 0.5px solid rgba(90, 80, 64, 0.35);
      border-radius: var(--radius-md);
      padding: 14px 16px;
    }

    .stat-label {
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .stat-value {
      font-family: var(--display);
      font-size: 26px;
      font-weight: 700;
      color: var(--text-primary);
      line-height: 1;
    }

    .stat-sub {
      font-size: 11px;
      color: var(--text-secondary);
      margin-top: 4px;
    }

    .stage-bar {
      display: flex;
      gap: 3px;
      align-items: center;
    }

    .stage-step {
      flex: 1;
      height: 5px;
      border-radius: 2px;
      background: var(--bg4);
      transition: background 0.3s;
    }

    .stage-step.done {
      background: #639922;
    }

    .stage-step.active {
      background: var(--amber);
      animation: slide 1.5s ease-in-out infinite;
    }

    .stage-step.error {
      background: #E24B4A;
    }

    @keyframes slide {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.5;
      }
    }

    .run-row {
      display: grid;
      grid-template-columns: 80px 1fr 90px 80px;
      align-items: center;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 0.5px solid rgba(90, 80, 64, 0.2);
    }

    .run-row:last-child {
      border-bottom: none;
    }

    .flux-toggle {
      display: flex;
      gap: 1px;
      background: var(--bg0);
      border-radius: var(--radius-md);
      padding: 3px;
    }

    .flux-btn {
      flex: 1;
      text-align: center;
      padding: 6px 12px;
      border: none;
      cursor: pointer;
      border-radius: var(--radius-sm);
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.05em;
      background: transparent;
      color: var(--text-muted);
      transition: all 0.2s;
    }

    .flux-btn.active {
      background: var(--amber);
      color: #1a0f00;
    }

    .devis-row {
      display: grid;
      grid-template-columns: 110px 1fr 90px 70px 32px;
      align-items: center;
      gap: 10px;
      padding: 9px 0;
      border-bottom: 0.5px solid rgba(90, 80, 64, 0.2);
      cursor: pointer;
      transition: background 0.15s;
    }

    .devis-row:last-child {
      border-bottom: none;
    }

    .devis-row:hover {
      background: var(--amber-glow);
      margin: 0 -20px;
      padding: 9px 20px;
    }

    .client-avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--display);
      font-size: 11px;
      font-weight: 700;
      background: var(--amber-faint);
      color: var(--amber);
      border: 0.5px solid var(--amber-border);
      flex-shrink: 0;
    }

    /* ── ORGANISMS ── */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--bg0);
      border-bottom: 0.5px solid rgba(90, 80, 64, 0.25);
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 52px;
    }

    .logo {
      display: flex;
      align-items: center;
      line-height: 1;
    }

    .nav-items {
      display: flex;
      gap: 2px;
    }

    .nav-item {
      padding: 6px 12px;
      border-radius: var(--radius-sm);
      font-size: 12px;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.2s;
      font-family: var(--mono);
      border: none;
      background: transparent;
    }

    .nav-item:hover {
      color: var(--text-primary);
      background: var(--bg2);
    }

    .nav-item.active {
      color: var(--amber);
      background: var(--amber-glow);
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .run-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border-radius: var(--radius-md);
      background: var(--amber);
      color: #0d0900;
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 500;
      border: none;
      cursor: pointer;
      letter-spacing: 0.02em;
      transition: all 0.15s;
    }

    .run-btn:hover {
      background: #FAC775;
    }

    .run-btn:active {
      transform: scale(0.97);
    }

    /* ── LAYOUT ── */
    .shell {
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px 20px 48px;
      display: grid;
      gap: 16px;
    }

    .grid-5 {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 12px;
    }

    .grid-6 {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 12px;
    }

    .grid-4 {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }

    .grid-3 {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: minmax(0, 1.6fr) minmax(0, 1fr);
      gap: 16px;
    }

    .kpi-table { width:100%; border-collapse:collapse; font-size:12px; margin-top:8px; }
    .kpi-table th { text-align:left; padding:6px 8px; font-size:10px; letter-spacing:.06em;
      text-transform:uppercase; color:var(--text-muted); border-bottom:.5px solid rgba(90,80,64,.3); }
    .kpi-table td { padding:9px 8px; border-bottom:.5px solid rgba(90,80,64,.15); color:var(--text-secondary); }
    .kpi-table tr:last-child td { border-bottom:none; }
    .kpi-table .retard { color:#F09595; font-size:11px; }
    .kpi-table .montant { font-family:var(--display); font-weight:600; color:var(--text-primary); }
    .kpi-empty { padding:20px; text-align:center; color:var(--text-muted); font-size:12px; }
    .kpi-loading { opacity:.4; }
    .stat-card.danger { border-color:rgba(163,45,45,.4); }
    .stat-card.danger .stat-value { color:#F09595; }
    .stat-card.success .stat-value { color:#97C459; }
    .stat-card.amber .stat-value { color:var(--amber); }
    .evol-up   { color:#97C459; font-size:11px; }
    .evol-down { color:#F09595; font-size:11px; }
    .stat-card[data-href] { cursor: pointer; transition: border-color 0.15s, background 0.15s; }
    .stat-card[data-href]:hover { border-color: rgba(201,158,103,0.5); background: rgba(201,158,103,0.04); }

    @media (max-width: 1100px) {
      .grid-5 { grid-template-columns: repeat(3, 1fr); }
      .grid-6 { grid-template-columns: repeat(3, 1fr); }
    }

    @media (max-width: 900px) {
      .grid-5 { grid-template-columns: repeat(2, 1fr); }
      .grid-6 { grid-template-columns: repeat(2, 1fr); }
      .grid-4 { grid-template-columns: repeat(2, 1fr); }
      .grid-2 {
        grid-template-columns: 1fr;
      }

      .grid-3 {
        grid-template-columns: repeat(2, 1fr);
      }

      .run-row {
        grid-template-columns: 70px 1fr 70px;
      }

      .run-row .run-col-dur {
        display: none;
      }

      .devis-row {
        grid-template-columns: 80px 1fr 70px 32px;
      }

      .devis-row .devis-col-score {
        display: none;
      }
    }

    @media (max-width: 600px) {
      .shell {
        padding: 16px 12px;
      }

      .grid-3 {
        grid-template-columns: 1fr 1fr;
      }

      .topbar {
        padding: 0 16px;
      }

      .nav-items {
        display: none;
      }
    }

    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .section-title {
      font-family: var(--display);
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .section-link {
      font-size: 11px;
      color: var(--amber-dim);
      cursor: pointer;
      background: none;
      border: none;
      font-family: var(--mono);
    }

    .section-link:hover {
      color: var(--amber);
    }

    /* ── PIPELINE ── */
    /* ── PIPELINE QUEUE ── */
    .pq-section { display:flex;flex-direction:column;gap:8px }
    .pq-run {
      background:var(--bg2);border:0.5px solid rgba(90,80,64,0.35);
      border-radius:var(--radius-md);padding:12px 14px;
      display:flex;flex-direction:column;gap:8px;
      transition:border-color 0.2s;
    }
    .pq-run:hover { border-color:var(--amber-border); }
    .pq-run.status-running { border-color:rgba(201,158,103,0.5); animation:pq-pulse-border 2s infinite; }
    .pq-run.status-devis_created { border-color:rgba(99,153,34,0.5); }
    .pq-run.status-error { border-color:rgba(226,75,74,0.4); }
    .pq-run.status-stopped { border-color:rgba(90,80,64,0.25); opacity:0.7; }
    @keyframes pq-pulse-border { 0%,100%{border-color:rgba(201,158,103,0.35)} 50%{border-color:rgba(201,158,103,0.7)} }
    .pq-header { display:flex;align-items:flex-start;gap:8px;min-width:0 }
    .pq-badge {
      flex-shrink:0;padding:2px 7px;border-radius:3px;font-size:10px;
      letter-spacing:0.05em;font-family:var(--mono);font-weight:600;
    }
    .pq-badge.NEW_PROJECT    { background:#2a1e08;color:#FAC775;border:0.5px solid #7A5218; }
    .pq-badge.PROJECT_UPDATE { background:#0a1a2e;color:#7BB0E0;border:0.5px solid #1F5080; }
    .pq-badge.SUPPLIER_INVOICE { background:#1a0a2e;color:#B07EE0;border:0.5px solid #4A2080; }
    .pq-badge.UNKNOWN        { background:var(--bg3);color:var(--text-muted);border:0.5px solid rgba(90,80,64,0.4); }
    .pq-badge.running        { background:#2a1e08;color:#FAC775;border:0.5px solid #7A5218;animation:pq-pulse-border 1.5s infinite; }
    .pq-badge.devis_created  { background:#0a2e14;color:#97C459;border:0.5px solid #3B6D11; }
    .pq-badge.error          { background:#2e0a0a;color:#F09595;border:0.5px solid #A32D2D; }
    .pq-badge.stopped        { background:var(--bg3);color:var(--text-muted);border:0.5px solid rgba(90,80,64,0.3); }
    .pq-subject { flex:1;font-size:12px;color:var(--text-primary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0; }
    .pq-meta { flex-shrink:0;font-size:10px;color:var(--text-muted);font-family:var(--mono);white-space:nowrap;margin-left:auto; }
    /* Stepper */
    .pq-stepper { display:flex;align-items:center;gap:0 }
    .pq-node {
      display:flex;flex-direction:column;align-items:center;gap:3px;
      width:52px;flex-shrink:0;
    }
    .pq-node-dot {
      width:22px;height:22px;border-radius:50%;display:flex;align-items:center;
      justify-content:center;font-size:11px;border:1.5px solid;transition:all 0.3s;
    }
    .pq-node-dot.done    { background:#0a2e14;border-color:#3B6D11;color:#97C459; }
    .pq-node-dot.active  { background:#2a1e08;border-color:#C99E67;color:#FAC775;animation:pulse 1.5s infinite; }
    .pq-node-dot.pending { background:var(--bg3);border-color:rgba(90,80,64,0.35);color:var(--text-muted); }
    .pq-node-dot.skip    { background:var(--bg1);border-color:rgba(90,80,64,0.2);color:rgba(90,80,64,0.4); }
    .pq-node-dot.error   { background:#2e0a0a;border-color:#A32D2D;color:#F09595; }
    .pq-node-label { font-size:9px;color:var(--text-muted);letter-spacing:0.04em;text-align:center;line-height:1.2; }
    .pq-connector { flex:1;height:1.5px;background:rgba(90,80,64,0.35);transition:background 0.3s; }
    .pq-connector.done { background:#3B6D11; }
    /* Actions */
    .pq-actions { display:flex;flex-wrap:wrap;gap:4px }
    .pq-action {
      display:inline-flex;align-items:center;gap:4px;padding:2px 7px;
      border-radius:3px;font-size:10px;color:var(--text-secondary);
      background:var(--bg3);border:0.5px solid rgba(90,80,64,0.3);
    }
    .pq-empty { padding:24px 0;text-align:center;color:var(--text-muted);font-size:12px;letter-spacing:0.05em; }
    /* Boutons d'action sur les cartes */
    .pq-action-row { display:flex;gap:6px;justify-content:flex-end;margin-top:2px }
    .pq-btn {
      display:inline-flex;align-items:center;gap:4px;padding:3px 10px;
      border-radius:4px;font-size:10px;font-family:var(--mono);cursor:pointer;
      border:0.5px solid;transition:all 0.15s;background:none;
    }
    .pq-btn-devis  { color:#FAC775;border-color:#7A5218;background:#2a1e0880 }
    .pq-btn-devis:hover  { background:#3a2a10;border-color:#C99E67 }
    .pq-btn-archive { color:var(--text-muted);border-color:rgba(90,80,64,0.4) }
    .pq-btn-archive:hover { color:var(--text-secondary);border-color:rgba(90,80,64,0.7) }
    .pq-btn-doli   { color:#7BB0E0;border-color:#1F5080;background:#0a1a2e80 }
    .pq-btn-doli:hover   { background:#0f2240;border-color:#5A9FD4 }
    .pq-btn-retry  { color:#C99E67;border-color:rgba(201,158,103,0.4) }
    .pq-btn-retry:hover  { background:var(--amber-glow) }
    .pq-btn:disabled { opacity:0.4;cursor:not-allowed }

    .pipeline-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .pipeline-status {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .pipeline-label {
      font-family: var(--display);
      font-size: 20px;
      font-weight: 700;
      color: var(--text-primary);
      line-height: 1.1;
    }

    .pipeline-sub {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .stages-list {
      display: grid;
      gap: 8px;
    }

    .stage-item {
      display: grid;
      grid-template-columns: 22px 1fr auto;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: var(--bg3);
      border-radius: var(--radius-md);
      border: 0.5px solid rgba(90, 80, 64, 0.25);
    }

    .stage-item.active-stage {
      border-color: var(--amber-border);
      background: var(--amber-glow);
    }

    .stage-num {
      font-size: 11px;
      color: var(--text-muted);
      font-weight: 500;
    }

    .stage-name {
      font-size: 12px;
      color: var(--text-primary);
    }

    /* ── ALERTS ── */
    .alert {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 14px;
      border-radius: var(--radius-md);
      background: var(--bg3);
      border-left: 3px solid;
      margin-bottom: 6px;
    }

    .alert-err {
      border-color: #A32D2D;
    }

    .alert-text {
      font-size: 12px;
      color: var(--text-secondary);
      line-height: 1.5;
    }

    .alert-title {
      font-weight: 500;
      color: var(--text-primary);
      display: block;
      margin-bottom: 2px;
    }

    .blocker-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 8px 0;
      border-bottom: 0.5px solid rgba(90, 80, 64, 0.2);
      font-size: 12px;
    }

    .blocker-item:last-child {
      border-bottom: none;
    }

    .blocker-key {
      font-family: var(--mono);
      color: var(--amber);
      font-size: 11px;
    }

    /* ── TICKER ── */
    .ticker-wrap {
      overflow: hidden;
      background: var(--bg1);
      border-top: 0.5px solid rgba(90, 80, 64, 0.2);
      border-bottom: 0.5px solid rgba(90, 80, 64, 0.2);
      padding: 7px 0;
    }

    .ticker-inner {
      display: flex;
      gap: 40px;
      animation: ticker 28s linear infinite;
      width: max-content;
    }

    @keyframes ticker {
      0% {
        transform: translateX(0);
      }

      100% {
        transform: translateX(-50%);
      }
    }

    .ticker-item {
      font-size: 11px;
      color: var(--text-muted);
      white-space: nowrap;
    }

    .ticker-item span {
      color: var(--amber);
      margin-right: 4px;
    }

    .tab-content {
      display: none;
    }

    .tab-content.visible {
      display: block;
    }

    /* ── N8N WORKFLOW CARDS ── */
    .wf-card {
      background: var(--bg3);
      border: 0.5px solid rgba(90, 80, 64, 0.3);
      border-radius: var(--radius-md);
      padding: 12px 14px;
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: start;
      gap: 8px;
      cursor: default;
      transition: border-color 0.15s;
    }
    .wf-card.has-id { cursor: pointer; }
    .wf-card.has-id:hover { border-color: var(--amber-border); background: var(--amber-glow); }
    .wf-card.active-wf { border-color: rgba(99,153,34,0.4); }
    .wf-card.inactive-wf { opacity: 0.65; }

<script>
    // ── Utilitaires ──────────────────────────────────────────────────────────
    const $ = id => document.getElementById(id);

    function fmt(val) {
      if (val == null) return '—';
      return new Intl.NumberFormat('fr-FR', { style:'currency', currency:'EUR', maximumFractionDigits:0 }).format(val);
    }

    function fmtDate(ts) {
      if (!ts) return '—';
      return new Date(ts * 1000).toLocaleDateString('fr-FR', { day:'2-digit', month:'2-digit', year:'2-digit' });
    }

    function fmtTs(str) {
      if (!str) return '—';
      const d = new Date(str.replace(' ', 'T'));
      if (isNaN(d)) return str;
      return d.toLocaleDateString('fr-FR', { day:'2-digit', month:'2-digit' }) + ' '
           + d.toLocaleTimeString('fr-FR', { hour:'2-digit', minute:'2-digit' });
    }

    function renderPdfLink(url) {
      if (!url) return '';
      return `<a href="${url}" target="_blank" title="PDF" style="color:var(--amber);text-decoration:none">↓</a>`;
    }

    // ── Nav ───────────────────────────────────────────────────────────────────
    document.querySelectorAll('.nav-item').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const label = btn.textContent.trim();
        if (label === 'IA')    $('section-ia').scrollIntoView({ behavior: 'smooth', block: 'start' });
        if (label === 'Devis') $('section-devis').scrollIntoView({ behavior: 'smooth', block: 'start' });
        if (label === 'Suivi') $('section-devis').scrollIntoView({ behavior: 'smooth', block: 'start' });
      });
    });

    // ── Lien Dolibarr ─────────────────────────────────────────────────────────
    function openDolibarr() {
      fetch('/api/config').then(r => r.ok ? r.json() : null).then(d => {
        const url = d && d.dolibarr_url ? d.dolibarr_url : null;
        if (url) window.open(url, '_blank');
      }).catch(() => {});
    }

    // ── Stats live Dolibarr ────────────────────────────────────────────────────
    let _pipelineLogInterval = null;
    let _DOLI_WEB = '';

    function closePipelineLog() {
      document.getElementById('pipeline-log-panel').style.display = 'none';
      if (_pipelineLogInterval) { clearInterval(_pipelineLogInterval); _pipelineLogInterval = null; }
    }

    async function refreshPipelineLog() {
      try {
        const r = await fetch('/api/log?lines=60');
        if (!r.ok) return;
        const d = await r.json();
        const lines = (d.lines || []);
        // Trouver le dernier bloc de run (depuis le dernier "═══")
        let start = lines.length - 1;
        for (let i = lines.length - 1; i >= 0; i--) {
          if (lines[i].includes('═'.repeat(10)) && lines[i].includes('démarrage')) { start = i; break; }
        }
        const block = lines.slice(start);
        const el = document.getElementById('pipeline-log-lines');
        el.textContent = block.join('\n');
        el.scrollTop = el.scrollHeight;
        // Coloriser les lignes
        el.innerHTML = block.map(l => {
          const c = l.includes('ERROR') || l.includes('erreur') ? '#f09595'
                  : l.includes('WARNING') ? '#f5c55a'
                  : l.includes('Pipeline OK') || l.includes('devis créé') ? '#7ecfa4'
                  : l.includes('StopPipeline') || l.includes('Pas d\'email') ? '#a8956a'
                  : '#c8b99a';
          return `<span style="color:${c}">${l.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</span>`;
        }).join('\n');
        el.scrollTop = el.scrollHeight;
        // Arrêter le polling si le pipeline est terminé (présence de la 2ème ligne "═══ Pipeline terminé")
        const done = block.filter(l => l.includes('Pipeline terminé')).length >= 1;
        if (done && _pipelineLogInterval) {
          clearInterval(_pipelineLogInterval);
          _pipelineLogInterval = null;
        }
      } catch(e) { /* silencieux */ }
    }

    async function runPipeline() {
      const btn    = document.getElementById('run-btn');
      const icon   = document.getElementById('run-btn-icon');
      const label  = document.getElementById('run-btn-label');

      btn.disabled = true;
      icon.textContent  = '⏳';
      label.textContent = 'En cours…';
      btn.style.opacity = '0.7';

      // Ouvrir le panel log immédiatement
      document.getElementById('pipeline-log-panel').style.display = 'block';
      document.getElementById('pipeline-log-lines').textContent = 'Démarrage du pipeline…';
      if (_pipelineLogInterval) clearInterval(_pipelineLogInterval);

      try {
        const r = await fetch('/api/run', { method: 'POST' });
        const d = await r.json();
        if (r.ok) {
          icon.textContent  = '✓';
          label.textContent = 'Lancé !';
          btn.style.background = '#4caf7d';
          // Démarrer le polling du log toutes les 2s
          _pipelineLogInterval = setInterval(refreshPipelineLog, 2000);
          // Rafraîchir la queue pipeline immédiatement + stats après 8s
          setTimeout(() => loadPipelineRuns(), 1000);
          setTimeout(() => { loadStats(); loadKpis(); loadPipelineRuns(); }, 8000);
        } else {
          icon.textContent  = '✗';
          label.textContent = 'Erreur';
          btn.style.background = '#e05a5a';
          document.getElementById('pipeline-log-lines').textContent = `Erreur HTTP ${r.status} : ${JSON.stringify(d)}`;
        }
      } catch (e) {
        icon.textContent  = '✗';
        label.textContent = 'Erreur';
        btn.style.background = '#e05a5a';
        document.getElementById('pipeline-log-lines').textContent = `Erreur réseau : ${e.message}`;
      }

      // Remettre à l'état initial après 3s
      setTimeout(() => {
        btn.disabled      = false;
        icon.textContent  = '▶';
        label.textContent = 'Lancer pipeline';
        btn.style.opacity    = '1';
        btn.style.background = '';
      }, 3000);
    }

    async function loadHealth() {
      const connList = $('conn-list');
      const connTs   = $('conn-ts');
      try {
        const r = await fetch('/api/connections');
        if (!r.ok) {
          connList.innerHTML = `<span style="font-size:11px;color:#F09595">⚠ Serveur non joignable (HTTP ${r.status})</span>`;
          return;
        }
        const d = await r.json();
        const items = d.connectors || [];
        if (!items.length) {
          connList.innerHTML = `<span style="font-size:11px;color:var(--text-muted)">—</span>`;
          return;
        }
        connList.innerHTML = items.map(c => {
          const color = c.ok ? '#97C459' : '#F09595';
          const dot   = c.ok ? 'dot-ok' : 'dot-err';
          const lat   = c.latency_ms ? ` · ${Math.round(c.latency_ms)}ms` : '';
          return `<span style="display:inline-flex;align-items:center;gap:5px;font-size:11px;color:${color}"><span class="dot ${dot}"></span>${c.name}${lat}</span>`;
        }).join('');
        connTs.textContent = d.last_check
          ? `vérifié ${new Date(d.last_check).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})}`
          : '';
      } catch(e) {
        connList.innerHTML = `<span style="font-size:11px;color:#F09595">⚠ Serveur non démarré</span>`;
      }
    }

    async function loadStats() {
      try {
        const r = await fetch('/api/stats');
        if (!r.ok) { console.warn('loadStats HTTP', r.status); return; }
        const d = await r.json();
        if (d.error) return;

        const web = d.doli_web || ''; _DOLI_WEB = web;

        function setStatCard(cardId, valId, nb, subId, subTxt, href, danger) {
          const card = $(cardId);
          $(valId).textContent = nb;
          if (subId) $(subId).textContent = subTxt;
          card.classList.remove('kpi-loading');
          if (href) {
            card.dataset.href = href;
            card.onclick = () => window.open(href, '_blank');
          }
          if (nb > 0) card.classList.add(danger ? 'danger' : 'amber');
        }

        setStatCard('stat-devis-semaine', 'stat-devis-semaine-val',
          d.devis_semaine.nb, 'stat-devis-semaine-sub', fmt(d.devis_semaine.total_ht),
          web ? `${web}/propal/list.php?search_statut=-1` : '');

        setStatCard('stat-cmds-semaine', 'stat-cmds-semaine-val',
          d.cmds_semaine.nb, 'stat-cmds-semaine-sub', fmt(d.cmds_semaine.total_ht),
          web ? `${web}/commande/list.php` : '');

        setStatCard('stat-devis-brouillon', 'stat-devis-brouillon-val',
          d.devis_brouillon.nb, 'stat-devis-brouillon-sub', fmt(d.devis_brouillon.total_ht),
          web ? `${web}/propal/list.php?search_statut=0` : '');

        setStatCard('stat-cmds-bloque', 'stat-cmds-bloque-val',
          d.cmds_bloque.nb, 'stat-cmds-bloque-sub', fmt(d.cmds_bloque.total_ht),
          web ? `${web}/commande/list.php?search_statut=0` : '', true);

        setStatCard('stat-cmds-fichiers', 'stat-cmds-fichiers-val',
          d.cmds_fichiers.nb, 'stat-cmds-fichiers-sub', fmt(d.cmds_fichiers.total_ht),
          web ? `${web}/commande/list.php?search_statut=1` : '');

        setStatCard('stat-cmds-enprod', 'stat-cmds-enprod-val',
          d.cmds_en_prod.nb, null, null,
          web ? `${web}/commande/list.php?search_statut=1` : '');

        setStatCard('stat-cmds-bat', 'stat-cmds-bat-val',
          d.cmds_bat.nb, 'stat-cmds-bat-sub', fmt(d.cmds_bat.total_ht),
          web ? `${web}/commande/list.php?search_statut=1` : '', true);

      } catch(e) {
        console.warn('loadStats:', e);
      }
    }

    // ── KPIs Dolibarr ─────────────────────────────────────────────────────────
    async function loadKpis() {
      try {
        const r = await fetch('/api/kpis');
        if (!r.ok) { $('kpi-ts').textContent = 'Dolibarr non connecté'; return; }
        const d = await r.json();
        if (d.error) { $('kpi-ts').textContent = 'Dolibarr non configuré'; return; }

        $('kpi-ts').textContent = 'Mis à jour ' + new Date(d.generated_at).toLocaleTimeString('fr-FR', { hour:'2-digit', minute:'2-digit' });
        const web = d.doli_web || ''; _DOLI_WEB = web;

        function linkCard(cardId, href) {
          const card = $(cardId);
          if (href) {
            card.dataset.href = href;
            card.onclick = () => window.open(href, '_blank');
          }
        }

        // CA HT mois
        const caCard = $('kpi-ca-card');
        $('kpi-ca').textContent = fmt(d.ca.mois_en_cours_ht);
        caCard.classList.remove('kpi-loading');
        if (d.ca.mois_en_cours_ht > 0) caCard.classList.add('success');
        if (d.ca.evolution_pct != null) {
          const sign = d.ca.evolution_pct >= 0 ? '+' : '';
          const cls  = d.ca.evolution_pct >= 0 ? 'evol-up' : 'evol-down';
          $('kpi-ca-evol').innerHTML = `<span class="${cls}">${sign}${d.ca.evolution_pct}%</span> vs mois précédent (${fmt(d.ca.mois_precedent_ht)})`;
        }
        linkCard('kpi-ca-card', web ? `${web}/compta/facture/list.php` : '');

        // Taux transformation
        const tt = d.taux_transfo;
        if (tt.pct != null) {

      try {

    async function visuelsGenerate() {

      result.innerHTML = '<span style="font-size:11px;color:var(--amber)">Génération en cours…</span>';

    // ── Dépôt fichiers (ligne sous IA) ───────────────────────────────────────
    function handleDepotFile(input, dossier) {
      if (!input.files || !input.files[0]) return;
      const file = input.files[0];
      const statusId = input.id.replace('depot-file-', 'status-') + '-d';
      // Réutiliser la logique depot existante si disponible
      if (typeof uploadFile === 'function') {
        uploadFile(file, dossier);
      } else {
        const fd = new FormData();
        fd.append('file', file);
        fd.append('dossier', dossier);
        const statusEl = document.getElementById(statusId);
        if (statusEl) statusEl.textContent = '↑ Envoi…';
        fetch('/api/upload', { method: 'POST', body: fd })
          .then(r => r.json())
          .then(d => { if (statusEl) statusEl.textContent = d.error ? '✗ Erreur' : '✓ OK'; })
          .catch(() => { if (statusEl) statusEl.textContent = '✗ Erreur'; });
      }
      input.value = '';
    }

    // ── Graphique CA mensuel ──────────────────────────────────────────────────
    let _caChartInstance = null;
    async function loadCaChart() {
      try {
        const r = await fetch('/api/ca-chart');
        if (!r.ok) return;
        const d = await r.json();
        if (d.error) return;

        const months = ['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc'];
        const cy = d.current_year;
        const palette = [
          { color: '#C99E67', alpha: 1,    type: 'bar'  },   // N
          { color: '#7A9E7E', alpha: 0.75, type: 'line' },   // N-1
          { color: '#6B7A9E', alpha: 0.5,  type: 'line' },   // N-2
          { color: '#7A6B6B', alpha: 0.35, type: 'line' },   // N-3
        ];
        const datasets = [cy, cy-1, cy-2, cy-3].map((yr, i) => {
          const ydata = d.years[String(yr)] || {};
          const data  = months.map((_, m) => ydata[String(m+1)] || 0);
          const p = palette[i];
          const cfg = {
            label: String(yr),
            data,
            borderColor: p.color,
            backgroundColor: i === 0 ? p.color + 'CC' : 'transparent',
            borderWidth: i === 0 ? 0 : 1.5,
            pointRadius: i === 0 ? 0 : 2,
            tension: 0.35,
          };
          if (i === 0) { cfg.type = 'bar'; }
          return cfg;
        });

        const ctx = $('ca-chart-canvas').getContext('2d');
        if (_caChartInstance) _caChartInstance.destroy();
        _caChartInstance = new Chart(ctx, {
          type: 'line',
          data: { labels: months, datasets },
          options: {
            responsive: true, maintainAspectRatio: false,
            interaction: { mode: 'index', intersect: false },
            plugins: {
              legend: { labels: { color: '#9A8F7A', font: { size: 11 }, boxWidth: 12 } },
              tooltip: {
                backgroundColor: '#1e1e1e', borderColor: '#C99E67', borderWidth: 0.5,
                titleColor: '#C99E67', bodyColor: '#D4C9B5',
                callbacks: { label: ctx => ` ${ctx.dataset.label} : ${fmt(ctx.parsed.y)}` },
              },
            },
            scales: {
              x: { ticks: { color: '#6E6456', font: { size: 10 } }, grid: { color: 'rgba(90,80,64,0.15)' } },
              y: { ticks: { color: '#6E6456', font: { size: 10 }, callback: v => fmt(v) }, grid: { color: 'rgba(90,80,64,0.15)' } },
            },
          },
        });
        if ($('ca-chart-ts')) $('ca-chart-ts').textContent = 'Mis à jour ' + new Date(d.generated_at).toLocaleTimeString('fr-FR', { hour:'2-digit', minute:'2-digit' });
      } catch(e) { console.warn('loadCaChart:', e); }
    }

    // ── Zone Alertes ──────────────────────────────────────────────────────────
    const ALERTE_TYPES = [
      { key:'delai_chaud',      label:'Délai chaud',        color:'#F09595', bg:'rgba(240,149,149,0.12)', icon:'🔥' },
      { key:'retard',           label:'Retard',             color:'#C44444', bg:'rgba(196,68,68,0.12)',   icon:'⏱' },
      { key:'cmd_complexe',     label:'Commande complexe',  color:'#FAC775', bg:'rgba(250,199,117,0.1)',  icon:'⚠' },
      { key:'qualite',          label:'Problème qualité',   color:'#C97A0A', bg:'rgba(201,122,10,0.12)',  icon:'🔍' },
      { key:'incident_machine', label:'Incident machine',   color:'#6B9EF0', bg:'rgba(107,158,240,0.1)',  icon:'⚙' },
      { key:'autre',            label:'Autre',              color:'#9A8F7A', bg:'rgba(154,143,122,0.1)',  icon:'•'  },
    ];

    function _loadAlertes() {
      return JSON.parse(localStorage.getItem('inpressco_alertes') || '[]');
    }
    function _saveAlertes(list) {
      localStorage.setItem('inpressco_alertes', JSON.stringify(list));
    }

    function renderAlertes() {
      const list   = _loadAlertes();
      const badge  = $('alertes-badge');
      const el     = $('alertes-list');
      badge.style.display = list.length ? 'inline-block' : 'none';
      if (list.length) badge.textContent = list.length;
      if (!list.length) {
        el.innerHTML = '<div style="color:var(--text-muted);font-size:12px;padding:6px 0">Aucune alerte active</div>';
        return;
      }
      el.innerHTML = list.map(a => {
        const t = ALERTE_TYPES.find(x => x.key === a.type) || ALERTE_TYPES[5];
        const timeStr = new Date(a.ts).toLocaleString('fr-FR', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' });
        return `<div class="alerte-item" style="border-left-color:${t.color};background:${t.bg};margin-bottom:6px">
          <div class="alerte-item-body">
            <div class="alerte-type-label" style="color:${t.color}">${t.icon} ${t.label}</div>
            <div class="alerte-desc">${a.desc}</div>
            <div class="alerte-ts">${timeStr}</div>
          </div>
          <button class="alerte-dismiss" onclick="dismissAlerte(${a.id})" title="Fermer">✕</button>
        </div>`;
      }).join('');
    }

    function addAlerte(typeKey) {
      const t = ALERTE_TYPES.find(x => x.key === typeKey);
      if (!t) return;
      const desc = prompt(`${t.icon} ${t.label} — Décrivez le problème :`);
      if (!desc || !desc.trim()) return;
      const list = _loadAlertes();
      list.unshift({ id: Date.now(), type: typeKey, desc: desc.trim(), ts: Date.now() });
      _saveAlertes(list);
      renderAlertes();
    }

    function dismissAlerte(id) {
      _saveAlertes(_loadAlertes().filter(a => a.id !== id));
      renderAlertes();
    }

    function clearAllAlertes() {
      if (!_loadAlertes().length) return;
      if (!confirm('Effacer toutes les alertes ?')) return;
      _saveAlertes([]);
      renderAlertes();
    }

    // Injecter les boutons rapides
    (function() {
      const wrap = $('alerte-btns');
      wrap.innerHTML = ALERTE_TYPES.map(t =>
        `<button class="alerte-quick-btn" style="color:${t.color};border-color:${t.color}40;background:${t.bg}"
          onclick="addAlerte('${t.key}')">${t.icon} ${t.label}</button>`
      ).join('');
    })();
    renderAlertes();

    // ── Jauge taux de transformation ─────────────────────────────────────────
    function updateGauge(pct) {
      const arc = $('gauge-arc');
      if (!arc || pct == null) return;
      const total = 166;
      const fill  = Math.min(1, pct / 100) * total;
      arc.setAttribute('stroke-dasharray', `${fill} ${total - fill}`);
      arc.setAttribute('stroke', pct >= 50 ? '#97C459' : pct >= 30 ? '#C99E67' : '#F09595');
    }

    // ── Section Objectif (localStorage) ─────────────────────────────────────
    function loadObjectif() {
      const obj = JSON.parse(localStorage.getItem('inpressco_objectif') || '{}');
      if ($('obj-incidents-nb')) $('obj-incidents-nb').textContent = obj.incidents_nb ?? '0';
      if ($('obj-incidents-ht')) $('obj-incidents-ht').textContent = fmt(obj.incidents_ht || 0);
      if ($('obj-marge'))        $('obj-marge').textContent        = obj.marge != null ? fmt(obj.marge) : '—';
      if ($('obj-tapis'))        $('obj-tapis').textContent        = obj.tapis ?? '0';
    }

    function editObjectif(field) {
      const obj = JSON.parse(localStorage.getItem('inpressco_objectif') || '{}');
      let val;
      if (field === 'incidents') {
        val = prompt('Nombre d\'incidents :', obj.incidents_nb ?? '0');
        if (val === null) return;
        obj.incidents_nb = parseInt(val) || 0;
        val = prompt('Montant HT total (€) :', obj.incidents_ht ?? '0');
        if (val === null) return;
        obj.incidents_ht = parseFloat(val) || 0;
      } else if (field === 'marge') {
        val = prompt('Marge cumulée mois en cours (€ HT) :', obj.marge ?? '0');
        if (val === null) return;
        obj.marge = parseFloat(val) || 0;
      } else if (field === 'tapis') {
        val = prompt('Nombre de dossiers tapis rouge :', obj.tapis ?? '0');
        if (val === null) return;
        obj.tapis = parseInt(val) || 0;
      }
      localStorage.setItem('inpressco_objectif', JSON.stringify(obj));
      loadObjectif();
    }

    // Afficher automatiquement si pas encore vu aujourd'hui
    function checkPopupDaily() {
      const last = localStorage.getItem('popup_last_shown');
      if (last !== new Date().toDateString()) {
        openPopup();

    let _kieImageData = null;
    let _kieImageMime = null;

    function kieSetImage(file) {

        _kieImageData = e.target.result.split(',')[1];

    async function kieAnalyse() {
      const prompt  = $('kie-prompt').value.trim();
      const context = $('kie-context').value.trim();
      if (!prompt && !_kieImageData) {
        $('kie-result').className = 'kie-result visible';
        $('kie-result-content').textContent = 'Ajoutez une image et/ou un prompt original avant de lancer l\'analyse.';
        return;
      }

      $('kie-btn').disabled = true;
      $('kie-result').className = 'kie-result visible';
      $('kie-result-content').textContent = '…';

      const msgContent = [];
      if (_kieImageData) {
        msgContent.push({ type: 'image', source: { type: 'base64', media_type: _kieImageMime, data: _kieImageData } });
      }
      const txt = [
        'Voici une image générée par kie.ai.',
        prompt   ? `Prompt original utilisé : "${prompt}"` : '',
        context  ? `Contexte / intentions : ${context}` : '',
        '',
        'En tant qu\'expert en direction artistique et impression offset/numérique pour InPressco :',
        '1. Analyse l\'image (style, palette, composition, ambiance)',
        '2. Propose 3 reprompts améliorés pour kie.ai en tenant compte des possibilités d\'impression (offset CMJN, finitions vernis, dorure, gaufrage)',
        '3. Suggère les matières et finitions InPressco qui valoriseraient ce visuel',
        '4. Note les points forts et les points à améliorer',
      ].filter(Boolean).join('\n');
      msgContent.push({ type: 'text', text: txt });

      let full = '';
      try {
        const resp = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages: [{ role: 'user', content: msgContent }] }),
        });
        const reader = resp.body.getReader();
        const dec = new TextDecoder();
        let buf = '';
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buf += dec.decode(value, { stream: true });
          const lines = buf.split('\n');
          buf = lines.pop();
          for (const line of lines) {
            if (!line.startsWith('data: ')) continue;
            const payload = line.slice(6);
            if (payload === '[DONE]') break;
            try {
              const chunk = JSON.parse(payload);
              if (chunk.text) full += chunk.text;
            } catch {}
          }
          $('kie-result-content').textContent = full;
        }
      } catch(e) {
        $('kie-result-content').textContent = 'Erreur : ' + e.message;
      }
      $('kie-btn').disabled = false;
    }

    function kieClear() {
      _kieImageData = null;

      $('kie-preview').style.display = 'none';
      $('kie-drop-hint').style.display = 'flex';

    function iaAppend(role, text, streaming) {
      const msgs = $('ia-messages');
      const div = document.createElement('div');
      div.className = 'ia-msg ia-msg-' + (role === 'user' ? 'user' : 'ai');
      div.innerHTML = `
        <div class="ia-bubble-label">${role === 'user' ? 'Vous' : 'Claude'}</div>
        <div class="ia-bubble">${text}${streaming ? '<span class="ia-cursor"></span>' : ''}</div>
      `;
      msgs.appendChild(div);
      msgs.scrollTop = msgs.scrollHeight;
      return div.querySelector('.ia-bubble');
    }

    async function _iaStream(bubble) {
      let full = '';
      try {
        const resp = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages: iaHistory }),
        });
        if (!resp.ok) {
          const err = await resp.json().catch(() => ({}));
          bubble.innerHTML = `<span class="ia-err">${err.error || 'Erreur ' + resp.status}</span>`;
        } else {
          const reader = resp.body.getReader();
          const dec = new TextDecoder();
          let buf = '';
          while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            buf += dec.decode(value, { stream: true });
            const lines = buf.split('\n');
            buf = lines.pop();
            for (const line of lines) {
              if (!line.startsWith('data: ')) continue;
              const payload = line.slice(6);
              if (payload === '[DONE]') break;
              try {
                const chunk = JSON.parse(payload);
                if (chunk.error) { full += '\n⚠ ' + chunk.error; }
                else if (chunk.tool_call) {
                  const labels = {
                    search_proposals:   '🔍 Recherche des devis…',
                    get_proposal:       '📄 Lecture du devis…',
                    search_thirdparties:'🔍 Recherche du client…',
                    get_thirdparty:     '👤 Lecture de la fiche client…',
                    search_invoices:    '🔍 Recherche des factures…',
                    search_orders:      '🔍 Recherche des commandes…',
                    update_proposal:       '✏️ Modification du devis…',
                    update_proposal_line:  '✏️ Modification d\'une ligne…',
                    validate_proposal:  '✅ Validation du devis…',
                    set_proposal_to_draft: '📝 Remise en brouillon…',
                  };
                  const lbl = labels[chunk.tool_call.name] || `⚙️ ${chunk.tool_call.name}…`;
                  full += `\n<span class="ia-tool-call">${lbl}</span>\n`;
                }
                else if (chunk.text) { full += chunk.text; }
              } catch {}
            }
            bubble.innerHTML = full + '<span class="ia-cursor"></span>';
            $('ia-messages').scrollTop = $('ia-messages').scrollHeight;
          }
          bubble.innerHTML = full;
          iaHistory.push({ role: 'assistant', content: full });
        }
      } catch(e) {
        bubble.innerHTML = `<span class="ia-err">Erreur réseau : ${e.message}</span>`;
      }
      iaStreaming = false;
      $('ia-send').disabled = false;
    }

    async function iaSend() {
      if (iaStreaming) return;
      const input = $('ia-input');
      const text = input.value.trim();
      if (!text && !_iaPendingImage) return;
      input.value = '';
      input.style.height = 'auto';
      $('ia-suggestions').style.display = 'none';

      const imgFile = _iaPendingImage;
      if (imgFile) clearIAImage();

      if (imgFile) {
        iaStreaming = true;
        $('ia-send').disabled = true;
        const b64 = await new Promise(resolve => {
          const r = new FileReader();
          r.onload = e => resolve(e.target.result.split(',')[1]);
          r.readAsDataURL(imgFile);
        });
        const msgs = $('ia-messages');
        const div = document.createElement('div');
        div.className = 'ia-msg ia-msg-user';
        div.innerHTML = `
          <div class="ia-bubble-label">Vous</div>
          <div class="ia-bubble" style="display:flex;flex-direction:column;gap:8px">
            <img src="data:${imgFile.type};base64,${b64}" class="lb-trigger" onclick="openLightbox(this.src)" style="max-width:440px;max-height:320px;border-radius:8px;object-fit:contain;width:100%">
            ${text ? `<span>${text}</span>` : ''}
          </div>`;
        msgs.appendChild(div);
        msgs.scrollTop = msgs.scrollHeight;
        const content = [{ type: 'image', source: { type: 'base64', media_type: imgFile.type, data: b64 } }];
        if (text) content.push({ type: 'text', text });
        iaHistory.push({ role: 'user', content });
        await _iaStream(iaAppend('assistant', '', true));
      } else {
        iaAppend('user', text, false);
        iaHistory.push({ role: 'user', content: text });
        iaStreaming = true;
        $('ia-send').disabled = true;
        await _iaStream(iaAppend('assistant', '', true));
      }
    }

    async function injectFileToIA(file, assetType, ref) {
      if (iaStreaming) return;
      $('section-ia').scrollIntoView({ behavior: 'smooth', block: 'start' });
      $('ia-suggestions').style.display = 'none';
      iaStreaming = true;
      $('ia-send').disabled = true;

      const typeLabel = assetType === 'charte' ? 'charte graphique' : 'inspiration produit';

      if (_IA_IMG_MIMES.has(file.type)) {
        const b64 = await new Promise(resolve => {
          const reader = new FileReader();
          reader.onload = e => resolve(e.target.result.split(',')[1]);
          reader.readAsDataURL(file);
        });
        const msgs = $('ia-messages');
        const div = document.createElement('div');
        div.className = 'ia-msg ia-msg-user';
        div.innerHTML = `
          <div class="ia-bubble-label">Vous</div>
          <div class="ia-bubble" style="display:flex;flex-direction:column;gap:8px">
            <img src="data:${file.type};base64,${b64}" style="max-width:220px;max-height:160px;border-radius:6px;object-fit:cover">
            <span>${typeLabel} · ${ref}</span>
          </div>
        `;
        msgs.appendChild(div);
        msgs.scrollTop = msgs.scrollHeight;
        iaHistory.push({
          role: 'user',
          content: [
            { type: 'image', source: { type: 'base64', media_type: file.type, data: b64 } },
            { type: 'text', text: `Voici la ${typeLabel} du document ${ref}. Analyse les éléments graphiques : couleurs principales, typographie, style visuel, ambiance. Comment orienter la production d'impression (matières, finitions, formats) ?` },
          ],
        });
      } else {
        const text = `J'ai déposé "${file.name}" (${typeLabel}) sur le document ${ref}. Note cet asset pour le workflow de génération visuelle.`;
        iaAppend('user', text, false);
        iaHistory.push({ role: 'user', content: text });
      }

      await _iaStream(iaAppend('assistant', '', true));
    }

    async function loadProposalsOrders() {
      const sel = $('assets-doc-select');
      const ts = $('assets-ts');
      if (ts) ts.textContent = 'Chargement…';
      try {
        const r = await fetch('/api/proposals-orders');

        const d = await r.json();
        sel.innerHTML = '<option value="">— Sélectionner un devis ou une commande —</option>';

        if (d.devis && d.devis.length) {
          const grp = document.createElement('optgroup');

    async function uploadAsset(file, assetType) {
      if (assetType === 'kieai') { setIAImage(file); return; }
      const sel = $('assets-doc-select');
      const statusEl = $('status-' + assetType);
      if (!sel.value) {
        statusEl.className = 'drop-status err';
        statusEl.textContent = '⚠ Sélectionnez d\'abord un devis ou une commande';
        return;
      }
      const { module, id } = JSON.parse(sel.value);
      statusEl.className = 'drop-status loading';
      statusEl.textContent = 'Envoi en cours…';

      const fd = new FormData();
      fd.append('file', file);
      fd.append('asset_type', assetType);
      fd.append('module', module);
      fd.append('doc_id', id);

      try {
        const r = await fetch('/api/upload-asset', { method: 'POST', body: fd });
        const d = await r.json();
        if (r.ok) {
          statusEl.className = 'drop-status ok';
          statusEl.textContent = `✓ ${d.filename} · ${d.size_kb} Ko → ${d.ref}`;
          injectFileToIA(file, assetType, d.ref);
        } else {
          statusEl.className = 'drop-status err';
          statusEl.textContent = `✗ ${d.detail || 'Erreur ' + r.status}`;
        }
      } catch(e) {
        statusEl.className = 'drop-status err';
        statusEl.textContent = '✗ Erreur réseau : ' + e.message;
      }
    }

    // ── PIPELINE FILE D'ATTENTE ────────────────────────────────────────────────
    const _PQ_CATEGORY_LABELS = {
      NEW_PROJECT: 'NOUVEAU DEVIS', PROJECT_UPDATE: 'MISE À JOUR',
      SUPPLIER_INVOICE: 'FACTURE FOURN.', SUPPLIER_QUOTE: 'DEVIS FOURN.',
      ACTION: 'ACTION', UNKNOWN: 'NON IDENTIFIÉ',
      devis_created: 'DEVIS CRÉÉ', error: 'ERREUR', running: 'EN COURS', stopped: 'STOPPÉ',
    };
    const _PQ_STEPS = [
      { key:'s01', icon:'📧', label:'Lecture' },
      { key:'s02', icon:'🤖', label:'Analyse IA' },
      { key:'routing', icon:'🔀', label:'Routing' },
      { key:'tiers',   icon:'👤', label:'Client' },
      { key:'devis',   icon:'📄', label:'Devis' },
    ];

    function _pqBadgeClass(run) {
      if (run.status === 'running') return 'running';
      if (run.status === 'devis_created') return 'devis_created';
      if (run.status === 'error') return 'error';
      if (run.status === 'stopped') return 'stopped';
      return run.routing_category || 'UNKNOWN';
    }

    function _pqStepState(run, stepKey) {
      const v = run.steps?.[stepKey];
      // Si pas de routing NEW_PROJECT, tiers/devis sont inutiles
      if ((stepKey === 'tiers' || stepKey === 'devis') && run.routing_category && run.routing_category !== 'NEW_PROJECT') return 'skip';
      return v || 'pending';
    }

    function _pqConnectorDone(run, fromKey, toKey) {
      return _pqStepState(run, fromKey) === 'done' && _pqStepState(run, toKey) === 'done';
    }

    function _pqFormatTime(ts) {
      if (!ts) return '';
      const d = ts.slice(0, 10), t = ts.slice(11, 16);
      const today = new Date().toISOString().slice(0, 10);
      return d === today ? t : `${d.slice(5)} ${t}`;
    }

    function _pqRenderRun(run) {
      const badgeClass = _pqBadgeClass(run);
      const badgeLabel = (run.status === 'devis_created' ? 'DEVIS CRÉÉ' :
                          run.status === 'error' ? 'ERREUR' :
                          run.status === 'running' ? 'EN COURS…' :
                          run.status === 'stopped' ? 'PAS D\'EMAIL' :
                          _PQ_CATEGORY_LABELS[run.routing_category] || run.routing_category || '—');

      const subjectHtml = run.email_subject
        ? `<span class="pq-subject" title="${run.email_subject.replace(/"/g,'&quot;')}">${run.email_subject}</span>`
        : `<span class="pq-subject" style="color:var(--text-muted);font-style:italic">${run.stop_reason || 'Pas d\'email'}</span>`;

      const durationHtml = run.duration_s != null ? `<span style="opacity:.5">${run.duration_s}s</span>` : '';

      const stepperHtml = _PQ_STEPS.map((s, i) => {
        const state = _pqStepState(run, s.key);
        const connector = i < _PQ_STEPS.length - 1
          ? `<div class="pq-connector ${_pqConnectorDone(run, s.key, _PQ_STEPS[i+1].key) ? 'done' : ''}"></div>`
          : '';
        return `<div class="pq-node">
          <div class="pq-node-dot ${state}">${s.icon}</div>
          <div class="pq-node-label">${s.label}</div>
        </div>${connector}`;
      }).join('');

      const actionsHtml = (run.actions || []).map(a =>
        `<span class="pq-action">${a.icon} ${a.text.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</span>`
      ).join('');

      // Boutons d'action selon statut
      let actionRowHtml = '';
      const enc = s => s ? s.replace(/'/g, "\\'") : '';
      if (run.status === 'routed' || run.status === 'ok') {
        const cat = run.routing_category || '';
        if (cat !== 'NEW_PROJECT' && run.email_subject && run.email_sender) {
          actionRowHtml = `<div class="pq-action-row">
            <button class="pq-btn pq-btn-devis" onclick="pqForceDevis('${enc(run.email_subject)}','${enc(run.email_sender)}',this)">→ Traiter comme devis</button>
            <button class="pq-btn pq-btn-archive" onclick="pqArchive('${enc(run.email_subject)}','${enc(run.email_sender)}',this)">✓ Archiver</button>
          </div>`;
        }
      } else if (run.status === 'devis_created' && run.devis_ref) {
        actionRowHtml = `<div class="pq-action-row">
          <button class="pq-btn pq-btn-doli" onclick="pqOpenDoli('${enc(run.devis_ref)}')">🔗 Voir dans Dolibarr</button>
        </div>`;
      } else if (run.status === 'error') {
        actionRowHtml = `<div class="pq-action-row">
          <button class="pq-btn pq-btn-retry" onclick="runPipeline()">↺ Relancer pipeline</button>
        </div>`;
      }

      return `<div class="pq-run status-${run.status}">
        <div class="pq-header">
          <span class="pq-badge ${badgeClass}">${badgeLabel}</span>
          ${subjectHtml}
          <span class="pq-meta">${_pqFormatTime(run.started_at)} ${durationHtml}</span>
        </div>
        <div class="pq-stepper">${stepperHtml}</div>
        ${actionsHtml ? `<div class="pq-actions">${actionsHtml}</div>` : ''}
        ${actionRowHtml}
      </div>`;
    }

    async function pqArchive(subject, sender, btn) {
      btn.disabled = true;
      btn.textContent = '…';
      try {
        const r = await fetch('/api/pipeline/archive-email', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({subject, sender})
        });
        const d = await r.json();
        if (r.ok) {
          btn.textContent = '✓ Archivé';
          btn.style.color = '#97C459';
          btn.closest('.pq-run').style.opacity = '0.45';
          setTimeout(loadPipelineRuns, 2000);
        } else {
          btn.textContent = `✗ ${d.detail || 'Erreur'}`;
          btn.style.color = '#F09595';
          btn.disabled = false;
        }
      } catch(e) {
        btn.textContent = '✗ Réseau';
        btn.disabled = false;
      }
    }

    async function pqForceDevis(subject, sender, btn) {
      // 1. Retire le préfixe [Routé-*] pour remettre dans la file
      btn.disabled = true;
      btn.textContent = '…';
      try {
        const r = await fetch('/api/pipeline/unroute-email', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({subject, sender})
        });
        const d = await r.json();
        if (r.ok) {
          btn.textContent = '✓ Remis en file';
          btn.style.color = '#97C459';
          // 2. Pré-remplir le chat IA avec le contexte
          const iaInput = $('ia-input');
          if (iaInput) {
            iaInput.value = `Traite cet email comme un nouveau devis : sujet "${subject}" de ${sender}. Recherche le tiers dans Dolibarr, analyse le besoin et crée le devis.`;
            iaInput.style.height = 'auto';
            iaInput.style.height = iaInput.scrollHeight + 'px';
            // Scroll vers le moteur IA
            $('section-ia')?.scrollIntoView({behavior:'smooth', block:'start'});
            $('ia-input')?.focus();
          }
        } else {
          btn.textContent = `✗ ${d.detail || 'Erreur'}`;
          btn.style.color = '#F09595';
          btn.disabled = false;
        }
      } catch(e) {
        btn.textContent = '✗ Réseau';
        btn.disabled = false;
      }
    }

    function pqOpenDoli(devisRef) {
      const base = _DOLI_WEB || '';
      if (base) window.open(`${base}/propal/list.php?search_ref=${encodeURIComponent(devisRef)}`, '_blank');
      else alert('URL Dolibarr non configurée');
    }

    async function loadPipelineRuns() {
      try {
        const r = await fetch('/api/pipeline-runs?limit=15');
        if (!r.ok) return;
        const d = await r.json();
        const runs = d.runs || [];
        const list = $('pq-list');
        const badge = $('pq-badge-running');
        const ts = $('pq-ts');

        const hasRunning = runs.some(r => r.status === 'running');
        badge.style.display = hasRunning ? 'inline-flex' : 'none';
        ts.textContent = runs.length ? `${runs.length} run${runs.length > 1 ? 's' : ''}` : '';

        if (!runs.length) {
          list.innerHTML = '<div class="pq-empty">Aucun run enregistré — lancez le pipeline pour voir l\'activité</div>';
          return;
        }
        list.innerHTML = runs.map(_pqRenderRun).join('');
      } catch(e) { /* silencieux */ }
    }

    // ── LIGHTBOX ──
    function openLightbox(src) {
      $('lightbox-img').src = src;
      $('lightbox').classList.add('open');
    }
    function closeLightbox() {
      $('lightbox').classList.remove('open');
      $('lightbox-img').src = '';
    }
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

    // ── DÉPÔT DE DOCUMENTS ───────────────────────────────────────────────────

    function depotQuick(dossier) {
      $('depot-dossier').value = dossier;
      $('depot-file').click();
    }
    function depotFileChange(e) {
      const f = e.target.files[0];
      if (f) $('depot-file-name').textContent = '📎 ' + f.name;
    }
    function depotFileDrop(e) {
      e.preventDefault();
      $('depot-drop').style.borderColor = 'var(--border)';
      const f = e.dataTransfer.files[0];
      if (!f) return;
      const dt = new DataTransfer();
      dt.items.add(f);
      $('depot-file').files = dt.files;
      $('depot-file-name').textContent = '📎 ' + f.name;
    }
    function depotReset() {
      $('depot-file').value = '';
      $('depot-file-name').textContent = '';
      $('depot-texte-input').value = '';
      $('depot-contexte').value = '';
      $('depot-resultat').innerHTML = '';
    }
    async function deposerDocument() {
      const dossier  = $('depot-dossier').value;
      const contexte = $('depot-contexte').value;
      const file     = $('depot-file').files[0];
      const texte    = $('depot-texte-input').value.trim();

      if (!file && !texte) { alert('Choisir un fichier ou saisir un texte'); return; }

      const form = new FormData();
      form.append('dossier', dossier);
      if (contexte) form.append('contexte', contexte);
      if (file)  form.append('file', file);
      else       form.append('texte_chat', texte);

      $('depot-btn').disabled = true;
      $('depot-resultat').innerHTML = '<span style="color:var(--text-muted);font-size:13px">⏳ Dépôt en cours…</span>';

      try {
        const res  = await fetch('/api/upload-doc', { method: 'POST', body: form });
        const data = await res.json();
        if (res.ok) {
          $('depot-resultat').innerHTML = `
            <div style="background:rgba(76,175,125,0.08);border:1px solid rgba(76,175,125,0.25);border-radius:6px;padding:12px;margin-top:4px">
              <div style="color:#4caf7d;font-size:13px;font-weight:600;margin-bottom:8px">✓ Déposé dans ${data.dossier} — ${data.fichier}</div>
              <pre style="white-space:pre-wrap;font-size:12px;color:var(--text-secondary);margin:0">${data.synthese}</pre>
            </div>`;
        } else {
          $('depot-resultat').innerHTML = `<div style="color:#e05a5a;font-size:13px">✗ Erreur : ${data.detail || 'inconnue'}</div>`;
        }
      } catch (err) {
        $('depot-resultat').innerHTML = `<div style="color:#e05a5a;font-size:13px">✗ Erreur réseau : ${err.message}</div>`;
      } finally {
        $('depot-btn').disabled = false;
      }
    }
  </script>
</body>

</html>
